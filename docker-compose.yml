version: '3.8'

services:
  # Marketplace Engine API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketplace-engine-api
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      REDIS_CONNECTION_STRING: redis:6379
    depends_on:
      cache:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/api/v1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - marketplace-network
    restart: unless-stopped

  # Redis cache for distributed caching and session storage
  cache:
    image: redis:7-alpine
    container_name: marketplace-engine-cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marketplace-network
    restart: unless-stopped

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: marketplace-engine-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - marketplace-network
    restart: unless-stopped

volumes:
  redis-data:
    driver: local

networks:
  marketplace-network:
    driver: bridge
